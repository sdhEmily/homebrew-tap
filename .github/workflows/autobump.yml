name: Bump on schedule or request

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-26
    env:
      TAP: sdhEmily/tap
      HOMEBREW_DEVELOPER: 1
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: true

      - name: Bump
        shell: bash
        run: |
          set -euo pipefail
          brew tap "$TAP" || true

          REPO_PATH="$(brew --repository "$TAP")"
          git -C "$REPO_PATH" config user.name  "$GITHUB_ACTOR"
          git -C "$REPO_PATH" config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git config --global --unset credential.helper 2>/dev/null || true
          git -C "$REPO_PATH" remote set-url origin "https://x-access-token:${HOMEBREW_GITHUB_API_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          CASKS=$(brew livecheck --tap "$TAP" --cask --newer-only --json | jq -r '.[] | "\(.cask) \(.version.latest)"')
          FORMULAE=$(brew livecheck --tap "$TAP" --newer-only --json | jq -r '.[] | select(.formula) | "\(.formula) \(.version.latest)"')

          [[ -z "${CASKS}${FORMULAE}" ]] && { echo "Nothing to bump."; exit 0; }

          if [[ -n "$CASKS" ]]; then
            while read -r name ver; do
              echo "Cask: $name -> $ver"
              brew bump-cask-pr --write-only --no-browse --version="$ver" "$TAP/$name" || true
              if ! git -C "$REPO_PATH" diff --quiet; then
                git -C "$REPO_PATH" add -A
                git -C "$REPO_PATH" commit -m "$name $ver"
              fi
            done <<<"$CASKS"
          fi

          if [[ -n "$FORMULAE" ]]; then
            while read -r name ver; do
              echo "Formula: $name -> $ver"
              brew bump-formula-pr --write-only --no-browse --version="$ver" "$TAP/$name" || true
              if ! git -C "$REPO_PATH" diff --quiet; then
                git -C "$REPO_PATH" add -A
                git -C "$REPO_PATH" commit -m "$name $ver"
              fi
            done <<<"$FORMULAE"
          fi

          git -C "$REPO_PATH"