name: Bump on schedule or request

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-26
    env:
      TAP: sdhEmily/tap
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: true

      - name: Bump
        run: |
          set -euo pipefail
          brew tap "$TAP"

          run_livecheck() {
            local result
            for i in 1 2 3; do
              result=$(brew livecheck "$@" 2>/dev/null) && { echo "$result"; return; }
              echo "Livecheck attempt $i failed, retrying in 15s..." >&2
              sleep 15
            done
            echo "[]"
          }

          CASKS=$(run_livecheck --tap "$TAP" --cask --newer-only --json \
            | jq -r '.[] | "\(.cask) \(.version.latest)"')
          FORMULAE=$(run_livecheck --tap "$TAP" --newer-only --json \
            | jq -r '.[] | select(.formula!=null) | "\(.formula) \(.version.latest)"')

          if [[ -z "${CASKS}${FORMULAE}" ]]; then
            echo "Nothing to bump."
            exit 0
          fi

          REPO_PATH="$(brew --repository "$TAP")"
          cd "$REPO_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${HOMEBREW_GITHUB_API_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          bump() {
            local type="$1" name="$2" version="$3"
            echo "Bumping $type $name -> $version"
            brew "bump-${type}-pr" --write-only --no-browse --version="$version" "$TAP/$name" || return
            if ! git diff --quiet; then
              git add -A
              git commit -m "$name $version"
            fi
          }

          while read -r name ver; do
            [[ -n "$name" ]] && bump cask "$name" "$ver"
          done <<<"$CASKS"

          while read -r name ver; do
            [[ -n "$name" ]] && bump formula "$name" "$ver"
          done <<<"$FORMULAE"

          git fetch origin main --quiet
          if ! git diff --quiet origin/main..HEAD; then
            git push origin HEAD:main
          fi
