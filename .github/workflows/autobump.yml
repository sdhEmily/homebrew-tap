name: Bump on schedule or request

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

permissions:
  contents: write

jobs:
  bump:
    runs-on: macos-26
    env:
      TAP: sdhEmily/tap
      HOMEBREW_DEVELOPER: 1
      HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: true

      - name: Bump
        run: |
          set -euo pipefail
          brew tap "$TAP" || true

          CASKS=$(brew livecheck --tap "$TAP" --cask --newer-only --json \
            | jq -r '.[] | "\(.cask) \(.version.latest)"')
          FORMULAE=$(brew livecheck --tap "$TAP" --newer-only --json \
            | jq -r '.[] | select(.formula!=null) | "\(.formula) \(.version.latest)"')

          [[ -z "${CASKS}${FORMULAE}" ]] && { echo "Nothing to bump."; exit 0; }

          REPO_PATH="$(brew --repository "$TAP")"
          git -C "$REPO_PATH" config user.name "$GITHUB_ACTOR"
          git -C "$REPO_PATH" config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git config --global --unset credential.helper 2>/dev/null || true
          git -C "$REPO_PATH" remote set-url origin \
            "https://x-access-token:${HOMEBREW_GITHUB_API_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          bump_and_commit() {
            local type="$1" name="$2" version="$3"
            echo "Bump $type $name -> $version"
            brew "bump-${type}-pr" --write-only --no-browse --version="$version" "$TAP/$name" || return
            if ! git -C "$REPO_PATH" diff --quiet; then
              git -C "$REPO_PATH" add -A
              git -C "$REPO_PATH" commit -m "$name $version"
            fi
          }

          [[ -n "$CASKS" ]] && while read -r name ver; do
            bump_and_commit cask "$name" "$ver"
          done <<<"$CASKS"

          [[ -n "$FORMULAE" ]] && while read -r name ver; do
            bump_and_commit formula "$name" "$ver"
          done <<<"$FORMULAE"

          git -C "$REPO_PATH" fetch origin main --quiet || true
          if ! git -C "$REPO_PATH" diff --quiet origin/main..HEAD; then
            git -C "$REPO_PATH" push origin HEAD:refs/heads/main
          fi
